name: Makoshine hydro scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '17,47 * * * *'
    - cron: '30-59 6 * * *'
    - cron: '0-30 7 * * *'

concurrency:
  group: makoshine-scraper
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browser and Linux deps
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node fetch-makoshine.js

      - name: Show summary
        run: |
          echo "=== all-posts.json (перші 40 рядків) ==="
          head -40 all-posts.json
          echo "=== desna-posts.json (legacy) ==="
          cat desna-posts.json

      - name: Commit JSON to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add all-posts.json all-history.json desna-posts.json desna-history.json
          git commit -m "update hydro data — all rivers" || echo "no changes"
          git push

      - name: Upload all-posts.json
        uses: actions/upload-artifact@v4
        with:
          name: all-posts-json
          path: all-posts.json

      - name: Upload desna-posts.json (legacy)
        uses: actions/upload-artifact@v4
        with:
          name: desna-posts-json
          path: desna-posts.json
